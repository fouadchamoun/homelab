name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      github.event.comment.author_association == 'OWNER' &&
      startsWith(github.event.comment.body, '/oc ')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a # latest
        env:
          SCALEWAY_API_KEY: ${{ secrets.SCALEWAY_API_KEY }}
        with:
          model: scaleway/glm-5.2
          # share: true
