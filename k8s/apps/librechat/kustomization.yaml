apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - librechat-credentials-secret.yaml

helmCharts:
  - name: librechat
    repo: oci://ghcr.io/danny-avila/librechat-chart
    version: 2.0.3
    releaseName: librechat
    valuesFile: values.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: librechat-config
  files:
    - assets/librechat.yaml