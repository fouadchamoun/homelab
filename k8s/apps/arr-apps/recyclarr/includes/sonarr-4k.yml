# Quality Definition Configuration
quality_definition:
  type: series
# Quality Profile Configuration
quality_profiles:
  - name: DEFAULT
    reset_unmatched_scores:
      enabled: false
    upgrade:
      allowed: true
      until_quality: WEB 2160p
      until_score: 10000
    min_format_score: 0
    quality_sort: top
    qualities:
      - name: WEB 2160p
        qualities:
          - WEBDL-2160p
          - WEBRip-2160p
# Set to 'true' to automatically remove custom formats from Sonarr when they are removed from
# the guide or your configuration. This will NEVER delete custom formats you manually created!
