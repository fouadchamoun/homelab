# Quality definitions from the guide to sync to Sonarr. Choices: series, anime
quality_definition:
  type: series
# Quality Profile Configuration
quality_profiles:
  - name: DEFAULT
    reset_unmatched_scores:
      enabled: false
    upgrade:
      allowed: true
      until_quality: 1080p
      until_score: 10000
    min_format_score: 0
    quality_sort: top
    qualities:
      - name: 1080p
        qualities:
          - WEBDL-1080p
          - WEBRip-1080p
          - Bluray-1080p
          - HDTV-1080p
      - name: 720p
        qualities:
          - WEBDL-720p
          - WEBRip-720p
          - Bluray-720p
          - HDTV-720p
# Set to 'true' to automatically remove custom formats from Sonarr when they are removed from
# the guide or your configuration. This will NEVER delete custom formats you manually created!
delete_old_custom_formats: true
custom_formats:
  # A list of custom formats to sync to Sonarr.
  # Use `recyclarr list custom-formats sonarr` for values you can put here.
  # https://trash-guides.info/Sonarr/Sonarr-collection-of-custom-formats/
