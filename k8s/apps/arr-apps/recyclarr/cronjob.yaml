apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
spec:
  schedule: "0 9 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: init-config
              image: recyclarr/recyclarr:8.6.0
              imagePullPolicy: IfNotPresent
              securityContext:
                privileged: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command:
                - sh
                - -c
                - |
                  mkdir -p /config/includes
                  cp -r /readonly-config/ /config/
              volumeMounts:
                - name: recyclarr-config
                  mountPath: /readonly-config
                  readOnly: true
                - name: config
                  mountPath: /config
          containers:
          - name: recyclarr
            image: recyclarr/recyclarr:8.6.0
            imagePullPolicy: IfNotPresent
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            command:
              - recyclarr
              - sync
              - --preview
            env:
              - name: TZ
                value: "Europe/Paris"
              - name: RECYCLARR_CONFIG_DIR
                value: "/config"
              - name: RECYCLARR_DATA_DIR
                value: "/data"
            volumeMounts:
              - name: data
                mountPath: /data
              - name: config
                mountPath: /config
              - name: secret-sonarr
                readOnly: true
                mountPath: "/run/secrets/sonarr"
              - name: secret-sonarr-4k
                readOnly: true
                mountPath: "/run/secrets/sonarr-4k"
              - name: secret-radarr-requests
                readOnly: true
                mountPath: "/run/secrets/radarr-requests"
              - name: secret-radarr-automated
                readOnly: true
                mountPath: "/run/secrets/radarr-automated"
              - name: secret-radarr-4k
                readOnly: true
                mountPath: "/run/secrets/radarr-4k"
          volumes:
          - name: config
            emptyDir: {}
          - name: data
            emptyDir: {}
          - name: recyclarr-config
            configMap:
              name: recyclarr-config
              items:
                - key: recyclarr.yml
                  path: recyclarr.yml
                - key: sonarr-main.yml
                  path: includes/sonarr-main.yml
                - key: sonarr-4k.yml
                  path: includes/sonarr-4k.yml
                - key: radarr-automated.yml
                  path: includes/radarr-automated.yml
                - key: radarr-requests.yml
                  path: includes/radarr-requests.yml
                - key: radarr-4k.yml
                  path: includes/radarr-4k.yml
          - name: secret-sonarr
            secret:
              secretName: sonarr
          - name: secret-sonarr-4k
            secret:
              secretName: sonarr-4k
          - name: secret-radarr-requests
            secret:
              secretName: radarr-requests
          - name: secret-radarr-automated
            secret:
              secretName: radarr-automated
          - name: secret-radarr-4k
            secret:
              secretName: radarr-4k
