base-app:
  image:
    repository: maintainerr/maintainerr
    tag: v3.10.1
  service:
    port: 8080
  ingressRoute:
    enabled: true
  pvc:
    enabled: true
    size: 500Mi
    mountPath: /opt/data
    cloneFromNfsPath: /mnt/user/appdata/maintainerr
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1024Mi
