{{- if .Values.ingressRoute.enabled -}}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "base-app.name" . }}
  labels:
    {{- include "base-app.labels" . | nindent 4 }}
  {{- with .Values.ingressRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    - websecure
  routes:
  - kind: Rule
    match: {{ include "base-app.ingressRouteMatchRule" . }}
    {{- with .Values.ingressRoute.middlewares }}
    middlewares:
      {{- toYaml . | nindent 12 }}
    {{- end }}
    services:
      - kind: Service
        name: {{ include "base-app.name" $ }}
        port: {{ $.Values.service.port }}
        scheme: {{ $.Values.service.scheme }}
        passHostHeader: true
        sticky:
          cookie:
            name: traefik-sticky-session
            httpOnly: true
            secure: true
            maxAge: 300 # 5m
{{- end }}
