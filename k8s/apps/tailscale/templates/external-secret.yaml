---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth
spec:
  secretStoreRef:
      kind: ClusterSecretStore
      name: scw-sm
  target:
      name: operator-oauth
  refreshInterval: 60s
  dataFrom:
  - extract:
      key: path:/tailscale/oauth_client/k8s_operator
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
