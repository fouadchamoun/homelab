---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  Corefile: |
    .:53 {
        errors
        health {
          lameduck 5s
        }
        ready
        log . {
          class error
        }
        prometheus :9153

        # Temporarily rewrite queries for new domain to old domain
        rewrite name sonarr.homelab.fouad.dev unraid.home
        rewrite name sonarr-4k.homelab.fouad.dev unraid.home
        rewrite name radarr-automated.homelab.fouad.dev unraid.home
        rewrite name radarr-requests.homelab.fouad.dev unraid.home
        rewrite name radarr-4k.homelab.fouad.dev unraid.home
        rewrite name tautulli.homelab.fouad.dev unraid.home

        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
        }
        hosts {
          192.168.200.10 unraid.home
          192.168.200.13 hass.home
          fallthrough
        }
        forward . /etc/resolv.conf {
          max_concurrent 1000
        }
        cache 30 {
          disable success cluster.local
          disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
