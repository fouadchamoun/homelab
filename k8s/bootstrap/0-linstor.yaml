---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: linstor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: cluster-bootstrap
  destination:
    server: "https://kubernetes.default.svc"
    namespace: piraeus-datastore
  sources:
    - repoURL: ghcr.io/piraeusdatastore/piraeus-operator
      chart: piraeus
      targetRevision: 2.10.5
      helm:
        releaseName: piraeus-operator
        valuesObject:
          installCRDs: true
          serviceAccount:
            name: piraeus-operator-controller-manager

    - repoURL: ghcr.io/piraeusdatastore/helm-charts
      chart: snapshot-controller
      targetRevision: 5.0.3
      helm:
        releaseName: snapshot-controller
        valuesObject:
          installCRDs: true
          volumeSnapshotClasses:
            - name: linbit-sds-snapshots
              annotations:
                snapshot.storage.kubernetes.io/is-default-class: "true"
              driver: linstor.csi.linbit.com
              deletionPolicy: Delete
              parameters:
                snap.linstor.csi.linbit.com/type: S3
                snap.linstor.csi.linbit.com/remote-name: scw-talos-linstor
                snap.linstor.csi.linbit.com/allow-incremental: "true"
                # snap.linstor.csi.linbit.com/delete-local: "false"
                snap.linstor.csi.linbit.com/s3-bucket: linstor-talos
                snap.linstor.csi.linbit.com/s3-endpoint: s3.fr-par.scw.cloud
                # snap.linstor.csi.linbit.com/s3-signing-region:
                # snap.linstor.csi.linbit.com/s3-use-path-style: "false"
                csi.storage.k8s.io/snapshotter-secret-name: scw-linstor-remote-secret
                csi.storage.k8s.io/snapshotter-secret-namespace: piraeus-datastore

    - repoURL: ghcr.io/piraeusdatastore/helm-charts
      chart: linstor-cluster
      targetRevision: 1.1.1
      helm:
        releaseName: linstor-cluster
        valuesObject:
          linstorCluster:
            externalController:
              url: http://192.168.200.50:3370
            nfsServer:
              enabled: false
          linstorSatelliteConfigurations:
            - name: host-network
              podTemplate:
                spec:
                  hostNetwork: true
            - name: talos-loader-override
              podTemplate:
                spec:
                  initContainers:
                    - name: drbd-shutdown-guard
                      $patch: delete
                    - name: drbd-module-loader
                      $patch: delete
                  volumes:
                    - name: run-systemd-system
                      $patch: delete
                    - name: run-drbd-shutdown-guard
                      $patch: delete
                    - name: systemd-bus-socket
                      $patch: delete
                    - name: lib-modules
                      $patch: delete
                    - name: usr-src
                      $patch: delete
                    - name: etc-lvm-backup
                      hostPath:
                        path: /var/etc/lvm/backup
                        type: DirectoryOrCreate
                    - name: etc-lvm-archive
                      hostPath:
                        path: /var/etc/lvm/archive
                        type: DirectoryOrCreate
          storageClasses:
            - name: linstor-replicated
              # annotations:
              #   storageclass.kubernetes.io/is-default-class: "true"
              reclaimPolicy: Retain
              allowVolumeExpansion: true
              volumeBindingMode: WaitForFirstConsumer
              provisioner: linstor.csi.linbit.com
              parameters:
                linstor.csi.linbit.com/storagePool: pve-nvme-lvm
                linstor.csi.linbit.com/resourceGroup: kube-rg-repl
                linstor.csi.linbit.com/placementCount: "2"
                linstor.csi.linbit.com/disklessOnRemaining: "true"
                DrbdOptions/auto-diskful: "1"
                csi.storage.k8s.io/fstype: xfs
          volumeSnapshotClasses: []
          volumeGroupSnapshotClasses: []

  syncPolicy:
    automated: null
      # prune: false
      # allowEmpty: false
      # selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
      - ServerSideApply=true
      - FailOnSharedResource=true
      - RespectIgnoreDifferences=true

  ignoreDifferences:
    - kind: ValidatingWebhookConfiguration
      group: "*"
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle

    - kind: CustomResourceDefinition
      group: "*"
      name: volumegroupsnapshotcontents.groupsnapshot.storage.k8s.io
      jqPathExpressions:
        - .spec.conversion.webhook.clientConfig.caBundle

    - kind: Secret
      group: "*"
      name: piraeus-operator-tls
      jsonPointers:
        - /data/ca.crt
        - /data/tls.crt
        - /data/tls.key

    - kind: Secret
      group: "*"
      name: snapshot-controller-conversion-webhook
      jsonPointers:
        - /data/ca.crt
        - /data/tls.crt
        - /data/tls.key
