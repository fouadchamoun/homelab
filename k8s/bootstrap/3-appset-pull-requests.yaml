---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pull-requests
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd-diff-preview/render: never
spec:
  goTemplate: true

  generators:
    - matrix:
        generators:
          - pullRequest:
              github:
                owner: fouadchamoun
                repo: homelab
                labels:
                  - argocd
              filters:
                - targetBranchMatch: "main"
              values:
                head_sha: "{{ .head_sha }}"
                appName: '{{ regexReplaceAll ".*\\(app:(.*?)\\).*" .title "${1}" }}'

          - merge:
              mergeKeys:
                - path.path # join on the app directory path
              generators:
                - git:
                    repoURL: https://github.com/fouadchamoun/homelab.git
                    revision: "{{ .values.head_sha }}"
                    directories:
                      - path: k8s/apps/{{ .values.appName }}
                # PATCH: optional per-app overrides from argocd-patch.yaml
                - git:
                    repoURL: https://github.com/fouadchamoun/homelab.git
                    revision: "{{ .values.head_sha }}"
                    files:
                      - path: "k8s/apps/{{ .values.appName }}/argocd-patch.yaml"

  template:
    metadata:
      name: "{{ .values.appName }}-pr-{{ .number }}"
    spec:
      project: default
      source:
        repoURL: https://github.com/fouadchamoun/homelab.git
        targetRevision: "{{ .head_sha }}"
        path: "k8s/apps/{{ .values.appName }}"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "pull-requests"
      syncPolicy:
        automated:
          prune: true
          allowEmpty: false
          selfHeal: false
        managedNamespaceMetadata:
          labels: # The labels to set on the application namespace
            pod-security.kubernetes.io/enforce: privileged
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - PruneLast=true
          - ServerSideApply=true
          - FailOnSharedResource=true

  templatePatch: |
    {{- if .extraPatch }}
    {{- .extraPatch | toYaml }}
    {{- end }}
