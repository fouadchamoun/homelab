---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: cluster-bootstrap
  syncPolicy:
    automated:
      prune: true
      allowEmpty: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/argoproj/argo-cd
    path: manifests/crds
    targetRevision: v3.4.2

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: cluster-bootstrap
  syncPolicy:
    automated:
      prune: true
      allowEmpty: false
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
      - ServerSideApply=true
      - FailOnSharedResource=true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 9.5.15
    helm:
      valuesObject:
        crds:
          install: false
        global:
          domain: argocd.homelab.fouad.dev
        configs:
          params:
            server.insecure: true
          cm:
            kustomize.buildOptions: --enable-helm
          secrets:
            createSecret: false
        controller:
          replicas: 3
        repoServer:
          replicas: 3
        applicationSet:
          replicas: 3
        server:
          replicas: 3
          ingress:
            enabled: true
            ingressClassName: traefik
        extraObjects:
        - apiVersion: argoproj.io/v1alpha1
          kind: AppProject
          metadata:
            name: cluster-bootstrap
            namespace: argocd
          spec:
            description: Cluster Bootstrap
            sourceRepos:
              - https://github.com/fouadchamoun/homelab.git
              - https://github.com/argoproj/argo-cd
              - https://argoproj.github.io/argo-helm
              - ghcr.io/piraeusdatastore/piraeus-operator
              - ghcr.io/piraeusdatastore/helm-charts
              - quay.io/jetstack/charts
              - https://charts.external-secrets.io
              - https://traefik.github.io/charts
              - https://charts.signoz.io
              - ghcr.io/kite-org/charts
            clusterResourceWhitelist:
              - group: '*'
                kind: '*'
            destinations:
              - server: https://kubernetes.default.svc
                namespace: argocd
              - server: https://kubernetes.default.svc
                namespace: kube-system
              - server: https://kubernetes.default.svc
                namespace: piraeus-datastore
              - server: https://kubernetes.default.svc
                namespace: external-secrets
              - server: https://kubernetes.default.svc
                namespace: cert-manager
              - server: https://kubernetes.default.svc
                namespace: traefik
              - server: https://kubernetes.default.svc
                namespace: signoz
              - server: https://kubernetes.default.svc
                namespace: kite-system

        - apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: cluster-bootstrap
            namespace: argocd
          spec:
            project: cluster-bootstrap
            syncPolicy:
              automated:
                prune: false
                allowEmpty: false
                selfHeal: true
            destination:
              server: https://kubernetes.default.svc
              namespace: argocd
            source:
              repoURL: https://github.com/fouadchamoun/homelab.git
              path: k8s/bootstrap
              targetRevision: main
