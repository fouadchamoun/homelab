---
# https://piraeus.io/docs/stable/how-to/external-controller/#configure-the-piraeus-resources
apiVersion: piraeus.io/v1
kind: LinstorCluster
metadata:
  name: linstor-cluster-config
  namespace: piraeus-datastore
spec:
  externalController:
    url: http://192.168.200.50:3370

---
# https://piraeus.io/docs/stable/how-to/external-controller/#configuring-host-networking-for-linstor-satellites
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: host-network
  namespace: piraeus-datastore
spec:
  podTemplate:
    spec:
      hostNetwork: true

---
# https://piraeus.io/docs/stable/how-to/talos/#configure-the-drbd-module-loader
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: talos-loader-override
spec:
  podTemplate:
    spec:
      initContainers:
        - name: drbd-shutdown-guard
          $patch: delete
        - name: drbd-module-loader
          $patch: delete
      volumes:
        - name: run-systemd-system
          $patch: delete
        - name: run-drbd-shutdown-guard
          $patch: delete
        - name: systemd-bus-socket
          $patch: delete
        - name: lib-modules
          $patch: delete
        - name: usr-src
          $patch: delete
        - name: etc-lvm-backup
          hostPath:
            path: /var/etc/lvm/backup
            type: DirectoryOrCreate
        - name: etc-lvm-archive
          hostPath:
            path: /var/etc/lvm/archive
            type: DirectoryOrCreate
