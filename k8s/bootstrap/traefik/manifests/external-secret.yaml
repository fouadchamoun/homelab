---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare
  namespace: traefik
spec:
  secretStoreRef:
      kind: ClusterSecretStore
      name: scw-sm
  target:
      name: cloudflare
  refreshInterval: 60s
  data:
    - secretKey: api-token
      remoteRef:
        key: path:/cloudflare/account_api_token/talos_cert_manager
        property: token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
