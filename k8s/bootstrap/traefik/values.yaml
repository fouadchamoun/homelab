# yaml-language-server: $schema=https://raw.githubusercontent.com/traefik/traefik-helm-chart/refs/heads/master/traefik/values.schema.json
image:  # @schema additionalProperties: false
  repository: traefik
  tag: v3.7.1

providers:
  kubernetesCRD:
    enabled: true
    allowExternalNameServices: true
  kubernetesIngress:
    enabled: true
  kubernetesGateway:
    enabled: false

service:
  enabled: true
  annotations:
    tailscale.com/proxy-group: ingress-proxies
    tailscale.com/hostname: k8s-traefik
  spec:
    type: LoadBalancer
    # loadBalancerIP: "192.168.200.80"
    loadBalancerClass: tailscale

deployment:
  enabled: true
  kind: Deployment
  replicas: 3

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0

affinity:
  podAntiAffinity:
   requiredDuringSchedulingIgnoredDuringExecution:
     - labelSelector:
         matchLabels:
           app.kubernetes.io/name: '{{ template "traefik.name" . }}'
           app.kubernetes.io/instance: '{{ .Release.Name }}-{{ include "traefik.namespace" . }}'
       topologyKey: kubernetes.io/hostname

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.homelab.fouad.dev`)
    entryPoints:
      - websecure

ports:
  websecure:
    asDefault: true
    port: 443
    http3:
      enabled: true
  web:
    port: 80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

tlsStore:
  default:
    defaultCertificate:
      secretName: wildcard-fouad-dev-tls

logs:
  general:
    level: INFO
    format: json
  access:
    enabled: true
