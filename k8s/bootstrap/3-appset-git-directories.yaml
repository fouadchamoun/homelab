---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: git-directories
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/fouadchamoun/homelab.git
              revision: main
              directories:
                - path: k8s/apps/*
                - path: k8s/apps/public-apps
                  exclude: true
                - path: k8s/apps/arr-apps
                  exclude: true
              values:
                namespace: "{{ .path.basename }}"
                appPath: "{{ .path.path }}"
          - merge:
              mergeKeys:
                - path.path # join on the app directory path
              generators:
                - git:
                    repoURL: https://github.com/fouadchamoun/homelab.git
                    revision: main
                    directories:
                      - path: "{{ .values.appPath }}"
                # PATCH: optional per-app overrides from argocd-patch.yaml
                - git:
                    repoURL: https://github.com/fouadchamoun/homelab.git
                    revision: main
                    files:
                      - path: "{{ .values.appPath }}/argocd-patch.yaml"

    - git:
        repoURL: https://github.com/fouadchamoun/homelab.git
        revision: main
        directories:
          - path: k8s/apps/public-apps/*
        values:
          namespace: public-apps

    - git:
        repoURL: https://github.com/fouadchamoun/homelab.git
        revision: main
        directories:
          - path: k8s/apps/arr-apps/*
        values:
          namespace: arr-apps

  # This sync policy pertains to the ApplicationSet, not to the Applications it creates.
  syncPolicy:
    # Prevents ApplicationSet controller from deleting Applications. Update is allowed
    applicationsSync: create-update

  template:
    metadata:
      name: "{{ .path.basename }}"
    spec:
      project: default
      source:
        repoURL: https://github.com/fouadchamoun/homelab.git
        targetRevision: main
        path: "{{ .path.path }}"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{ .values.namespace }}"
      syncPolicy:
        automated:
          prune: true
          allowEmpty: false
          selfHeal: false
        managedNamespaceMetadata:
          labels: # The labels to set on the application namespace
            pod-security.kubernetes.io/enforce: privileged
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - PruneLast=true
          - ServerSideApply=true
          - FailOnSharedResource=true
